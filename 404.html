<!DOCTYPE html>
<html>
<body>

<h2>Login</h2>

<input id="user" type="text" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>

<button onclick="login()">Masuk</button>

<p id="hasil"></p>

<div id="secret" style="display:none;">
    <h3>🔓 Pesan Rahasia</h3>
    <p id="msg"></p>
</div>

<script>

const hashedUser = "86e68363a3da0c8a647ba9730882a43075e8a53a6c9dadfdc23a90466126f68f";
const hashedPass = "6f98ba179f77fb2d397f106881f8fa4b8df9d086cbf74037c53b14c6e8da2f3b";

const encryptedText = "aHR0cHM6Ly9kaXNjb3JkLmdnL3EyRnM4Qks0N1I=";

function decodeBase64(str) {
    return atob(str);
}

async function hashText(text) {
    const msg = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest("SHA-256", msg);
    return [...new Uint8Array(hash)]
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
}

async function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    let hu = await hashText(u);
    let hp = await hashText(p);

    if (hu === hashedUser && hp === hashedPass) {

        document.getElementById("hasil").innerHTML = "Login berhasil";

        let text = decodeBase64(encryptedText);
        document.getElementById("msg").innerHTML = text;

        document.getElementById("secret").style.display = "block";

    } else {
        document.getElementById("hasil").innerHTML = "Login gagal";
        document.getElementById("secret").style.display = "none";
    }
}

</script>

</body>
</html>
